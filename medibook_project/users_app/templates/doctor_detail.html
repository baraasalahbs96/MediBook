{% extends 'base.html' %}
{% block content %}
<div class="dashboard-header">
    <h2><i class="fas fa-user-md"></i> Dr. {{ doctor.name }}</h2>
    <p>{{ doctor.specialization }}</p>
</div>

<div style="padding: 10px 20px;">
    <button onclick="history.back()" class="btn btn-secondary">
        <i class="fas fa-arrow-left"></i> Back
    </button>
</div>

<div class="dashboard-container">
    <div class="card">
        <div class="card-body">
            <form method="POST">
                {% csrf_token %}
                <div style="margin-bottom:10px;">
                    <label>Name</label>
                    <input type="text" name="name" value="{{ doctor.name }}" class="form-control">
                </div>
                <div style="margin-bottom:10px;">
                    <label>Specialization</label>
                    <input type="text" name="specialization" value="{{ doctor.specialization }}" class="form-control">
                </div>
                <div style="margin-bottom:10px;">
                    <label>Email</label>
                    <input type="email" name="email" value="{{ doctor.email }}" class="form-control">
                </div>
                <div style="margin-bottom:10px;">
                    <label>Phone</label>
                    <input type="text" name="phone" value="{{ doctor.phone }}" class="form-control">
                </div>
                <div style="margin-bottom:10px;">
                    <label>Bio</label>
                    <textarea name="bio" class="form-control" rows="3">{{ doctor.bio }}</textarea>
                </div>
                <button type="submit" class="btn btn-primary">Save Changes</button>
            </form>

            <form method="POST" action="{% url 'delete_doctor' doctor.id %}" style="margin-top:10px;">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger" onclick="return confirm('Delete this doctor?')">
                    <i class="fas fa-trash"></i> Delete Doctor
                </button>
            </form>  
        </div>
    </div>
</div>
{% endblock %}
