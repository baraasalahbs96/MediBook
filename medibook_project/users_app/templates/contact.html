{% extends 'base.html' %}
{% block title %}Contact Us{% endblock %}
{% block content %}

<section class="section">
    <h1 class="section-title">Contact Us</h1>

    <div class="contact-grid mb-3">
        <div class="contact-item">
            <div class="contact-icon"><i class="fas fa-phone"></i></div>
            <h6>Phone</h6>
            <p>+1000 000 0000</p>
        </div>
        <div class="contact-item">
            <div class="contact-icon"><i class="fas fa-envelope"></i></div>
            <h6>Email</h6>
            <p>support@medibook.com</p>
        </div>
        <div class="contact-item">
            <div class="contact-icon"><i class="fas fa-map-marker-alt"></i></div>
            <h6>Location</h6>
            <p>Princeton, New Jersey</p>
        </div>
    </div>

    <!-- map -->
    <div class="clinic-map">
        <iframe
            class="clinic-map-frame"
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3045.123!2d-74.6559!3d40.3497!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x89c3e6d3b4d3b4d3%3A0x1234567890!2sPrinceton%2C+NJ!5e0!3m2!1sen!2sus!4v1234567890"
            width="100%"
            height="400"
            allowfullscreen=""
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade">
        </iframe>
    </div>

    <div class="text-center mt-20">
        <a href="https://maps.google.com/?q=Princeton,New+Jersey" target="_blank" class="btn btn-primary">
            <i class="fas fa-map-marked-alt"></i> Open in Google Maps
        </a>
    </div>
</section>

{% endblock %}
